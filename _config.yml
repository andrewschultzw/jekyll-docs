title: Schultz Solutions Docs
description: Homelab documentation and build logs

theme: just-the-docs

url: "https://docs.schultzsolutions.tech"

color_scheme: dark

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

collections:
  docs:
    permalink: "/:collection/:path/"
    output: true

just_the_docs:
  collections:
    docs:
      name: Docs
      nav_fold: true

nav_links:
  - title: Build Log
    url: /blog

exclude:
  - rebuild.sh
  - README.md
  - LICENSE
